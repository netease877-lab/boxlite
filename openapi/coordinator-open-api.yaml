---
openapi: 3.1.1
info:
  title: BoxLite Coordinator Admin API
  version: 0.1.0
  description: |
    Admin REST API for the BoxLite coordinator.

    These endpoints are for platform operators and dashboards — not for
    end-users or workers. Workers communicate with the coordinator via gRPC.

    ## Endpoints

    - **Worker management** — list, inspect, remove, and control worker status
    - **Health probes** — liveness and readiness checks for orchestrators (k8s)
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: BoxLite
    url: https://github.com/boxlite-ai/boxlite

servers:
  - url: "{scheme}://{host}"
    description: BoxLite Coordinator
    variables:
      scheme:
        default: https
        enum: [https, http]
      host:
        default: api.boxlite.ai

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
security:
  - BearerAuth: []

tags:
  - name: Workers
    description: Worker node management
  - name: Health
    description: Liveness and readiness probes

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # ── Workers ──────────────────────────────────────────────────────────────

  /v1/admin/workers:
    get:
      operationId: listWorkers
      summary: List all workers
      description: Returns all registered workers with their current status and capacity.
      tags: [Workers]
      responses:
        "200":
          description: List of workers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/workers/{worker_id}:
    get:
      operationId: getWorker
      summary: Get a worker by ID
      description: Returns full details for a single worker.
      tags: [Workers]
      parameters:
        - $ref: "#/components/parameters/WorkerId"
      responses:
        "200":
          description: Worker details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerDetail"
        "404":
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: removeWorker
      summary: Remove a worker
      description: |
        Removes a worker and all its box mappings (cascade delete).
        Boxes running on this worker become orphaned.
      tags: [Workers]
      parameters:
        - $ref: "#/components/parameters/WorkerId"
      responses:
        "204":
          description: Worker removed
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/workers/{worker_id}/status:
    patch:
      operationId: updateWorkerStatus
      summary: Update worker status
      description: |
        Set a worker's status. Only `active` and `draining` transitions are
        allowed via this endpoint. Use `DELETE` to remove a worker.

        - `active` — worker accepts new boxes
        - `draining` — no new boxes scheduled; existing boxes keep running
      tags: [Workers]
      parameters:
        - $ref: "#/components/parameters/WorkerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkerStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerDetail"
        "400":
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/workers/by-box/{box_id}:
    get:
      operationId: getWorkerByBox
      summary: Find worker for a box
      description: Look up which worker owns a given box.
      tags: [Workers]
      parameters:
        - name: box_id
          in: path
          required: true
          schema:
            type: string
          description: Box ID to look up
      responses:
        "200":
          description: Worker that owns this box
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerDetail"
        "404":
          description: Box not routed to any worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Health ───────────────────────────────────────────────────────────────

  /v1/health:
    get:
      operationId: liveness
      summary: Liveness probe
      description: Returns 200 if the coordinator process is running.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Coordinator is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/health/ready:
    get:
      operationId: readiness
      summary: Readiness probe
      description: |
        Returns 200 if the coordinator is ready to serve traffic.
        Checks that the database is accessible and at least one active worker
        is registered.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Coordinator is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Coordinator is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin bearer token

  parameters:
    WorkerId:
      name: worker_id
      in: path
      required: true
      schema:
        type: string
      description: Worker ID (12-char Base62)

  schemas:
    # ── Worker Types ──

    WorkerListResponse:
      type: object
      required: [workers]
      properties:
        workers:
          type: array
          items:
            $ref: "#/components/schemas/WorkerSummary"

    WorkerSummary:
      type: object
      required: [id, name, url, status, running_boxes, last_heartbeat]
      properties:
        id:
          type: string
          description: Worker ID (12-char Base62)
        name:
          type: string
          description: Human-readable name (e.g., "frosty-meadow-42")
        url:
          type: string
          description: Worker gRPC endpoint URL
        status:
          $ref: "#/components/schemas/WorkerStatus"
        running_boxes:
          type: integer
          format: uint32
        last_heartbeat:
          type: string
          format: date-time

    WorkerDetail:
      type: object
      required: [id, name, url, labels, status, capacity, registered_at, last_heartbeat]
      properties:
        id:
          type: string
          description: Worker ID (12-char Base62)
        name:
          type: string
          description: Human-readable name
        url:
          type: string
          description: Worker gRPC endpoint URL
        labels:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary labels for scheduling affinity
        status:
          $ref: "#/components/schemas/WorkerStatus"
        capacity:
          $ref: "#/components/schemas/WorkerCapacity"
        registered_at:
          type: string
          format: date-time
        last_heartbeat:
          type: string
          format: date-time

    WorkerStatus:
      type: string
      enum: [active, draining, unreachable, removed]

    WorkerCapacity:
      type: object
      required: [max_boxes, available_cpus, available_memory_mib, running_boxes]
      properties:
        max_boxes:
          type: integer
          format: uint32
        available_cpus:
          type: integer
          format: uint32
        available_memory_mib:
          type: integer
          format: uint64
        running_boxes:
          type: integer
          format: uint32

    UpdateWorkerStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, draining]
          description: Target status. Only active and draining are allowed.

    # ── Health Types ──

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    ReadinessResponse:
      type: object
      required: [status, active_workers]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        active_workers:
          type: integer
          format: uint32
          description: Number of active workers
        reason:
          type: string
          description: Reason for not_ready status (omitted when ready)

    # ── Error Types ──

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorModel"

    ErrorModel:
      type: object
      required: [message, type, code]
      properties:
        message:
          type: string
        type:
          type: string
        code:
          type: integer
